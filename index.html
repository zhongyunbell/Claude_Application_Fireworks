<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fireworks Show</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; cursor: crosshair; }
    canvas { display: block; }
    #ui {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      gap: 14px;
      align-items: center;
    }
    .btn {
      padding: 12px 28px;
      border: 2px solid rgba(255,255,255,0.35);
      border-radius: 40px;
      background: rgba(255,255,255,0.08);
      color: #fff;
      font: 600 15px/1 'Segoe UI', system-ui, sans-serif;
      letter-spacing: 0.5px;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: all 0.25s ease;
      user-select: none;
    }
    .btn:hover {
      background: rgba(255,255,255,0.18);
      border-color: rgba(255,255,255,0.6);
      transform: scale(1.05);
    }
    .btn.active {
      background: rgba(255,100,60,0.3);
      border-color: rgba(255,140,80,0.7);
      box-shadow: 0 0 20px rgba(255,100,50,0.3);
    }
    #hint {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.4);
      font: 400 14px/1 'Segoe UI', system-ui, sans-serif;
      pointer-events: none;
      transition: opacity 1s;
    }
    #type-bar {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    #type-bar-label {
      color: rgba(255,255,255,0.35);
      font: 600 11px/1 'Segoe UI', system-ui, sans-serif;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      text-align: center;
      margin-bottom: 2px;
    }
    .type-btn {
      padding: 8px 16px;
      border: 1.5px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.6);
      font: 500 13px/1 'Segoe UI', system-ui, sans-serif;
      cursor: pointer;
      backdrop-filter: blur(6px);
      transition: all 0.2s ease;
      user-select: none;
      text-align: center;
    }
    .type-btn:hover {
      background: rgba(255,255,255,0.12);
      color: #fff;
      border-color: rgba(255,255,255,0.4);
    }
    #credit {
      position: fixed;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.35);
      font: 400 12px/1 'Segoe UI', system-ui, sans-serif;
      pointer-events: none;
      z-index: 10;
    }
    .type-btn.selected {
      background: rgba(255,200,60,0.2);
      border-color: rgba(255,200,60,0.6);
      color: #fff;
      box-shadow: 0 0 12px rgba(255,200,60,0.15);
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="hint">Click anywhere to launch a firework</div>
  <div id="type-bar">
    <div id="type-bar-label">Explosion</div>
    <button class="type-btn selected" data-type="random">Random</button>
    <button class="type-btn" data-type="spherical">Spherical</button>
    <button class="type-btn" data-type="ring">Ring</button>
    <button class="type-btn" data-type="double">Double</button>
    <button class="type-btn" data-type="willow">Willow</button>
    <button class="type-btn" data-type="crackle">Crackle</button>
  </div>
  <div id="credit">Created by Julie Huang zhongyunbell@gmail.com</div>
  <div id="ui">
    <button class="btn" id="showBtn">Auto Show</button>
    <button class="btn" id="finaleBtn">Grand Finale</button>
  </div>
  <script src="fireworks.js?v=2"></script>
</body>
</html>
